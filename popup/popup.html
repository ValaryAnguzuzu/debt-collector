<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Debt Collector</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1>Debt Collector</h1>
      <p class="meta" id="status">Status: --</p>
      <p id="debt">Debt: --:--</p>
      <p id="streak">Streak: -- days</p>

      <section class="sites">
        <h2>Banned Sites</h2>
        <textarea id="bannedSites" rows="5"></textarea>
      </section>

      <section class="sites">
        <h2>Productive Sites</h2>
        <textarea id="productiveSites" rows="5"></textarea>
      </section>

      <button id="saveSites" type="button">Save Site Lists</button>
      <section class="forgive">
        <h2>Forgive Session</h2>
        <p class="help">Use on the currently active site.</p>
        <div class="forgive-row">
          <select id="forgiveDuration">
            <option value="5">5 min</option>
            <option value="10">10 min</option>
            <option value="15" selected>15 min</option>
            <option value="30">30 min</option>
          </select>
          <button id="startForgive" type="button">Start</button>
        </div>
        <p id="forgiveState" class="save-state"></p>
      </section>
      <p id="saveState" class="save-state"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
